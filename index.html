<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Calendario - Widget Minimalista</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #f8f9fa 0%, #f0f2f5 100%);
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.07);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #A9BDD9 0%, #BDAED6 100%);
            padding: 30px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 600;
        }

        .auth-section {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .logout-btn, .login-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid white;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
            font-size: 14px;
        }

        .login-btn {
            background: #A9BDD9;
            border: none;
        }

        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .login-btn:hover {
            background: #8fa5c9;
        }

        .user-info {
            background: rgba(255, 255, 255, 0.15);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            backdrop-filter: blur(10px);
        }

        .content {
            padding: 30px;
            min-height: 400px;
        }

        .login-container {
            text-align: center;
            padding: 60px 30px;
        }

        .login-container h2 {
            color: #A9BDD9;
            margin-bottom: 15px;
            font-size: 24px;
        }

        .login-container p {
            color: #666;
            margin-bottom: 30px;
            font-size: 15px;
            line-height: 1.6;
        }

        .filters {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-label {
            color: #666;
            font-size: 14px;
            font-weight: 500;
        }

        .calendar-checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            background: white;
            border: 2px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
            font-weight: 500;
        }

        .calendar-checkbox:hover {
            border-color: #A9BDD9;
        }

        .calendar-checkbox input {
            cursor: pointer;
            width: 18px;
            height: 18px;
        }

        .color-dot {
            width: 12px;
            height: 12px;
            border-radius: 3px;
            display: inline-block;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            gap: 12px;
            flex-wrap: wrap;
        }

        .month-nav {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .nav-btn {
            background: #BFD8C8;
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            font-size: 13px;
            transition: all 0.2s;
        }

        .nav-btn:hover {
            opacity: 0.85;
        }

        .month-title {
            color: #A9BDD9;
            font-size: 18px;
            font-weight: 600;
            min-width: 180px;
            text-align: center;
        }

        .export-btn {
            background: #E6B0C2;
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            font-size: 14px;
            transition: all 0.2s;
        }

        .export-btn:hover {
            opacity: 0.85;
            transform: translateY(-1px);
        }

        .calendar-grid {
            background: white;
            border-radius: 12px;
            border: 1px solid #eee;
            padding: 20px;
            margin-bottom: 24px;
            overflow-x: auto;
        }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            margin-bottom: 12px;
            text-align: center;
        }

        .weekday {
            color: #A9BDD9;
            font-weight: 600;
            font-size: 12px;
            padding: 12px 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            min-height: 400px;
        }

        .day {
            background: #f9f9f9;
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 12px;
            min-height: 100px;
            cursor: pointer;
            transition: all 0.2s;
            overflow-y: auto;
            max-height: 120px;
        }

        .day:hover {
            border-color: #A9BDD9;
            box-shadow: 0 2px 8px rgba(169, 189, 217, 0.1);
        }

        .day.other-month {
            background: #fafafa;
            opacity: 0.5;
        }

        .day.today {
            background: #EDE2B8;
            border: 2px solid #EDE2B8;
        }

        .day-number {
            color: #A9BDD9;
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 14px;
        }

        .events-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .event-item {
            background: white;
            border-left: 3px solid #A9BDD9;
            padding: 4px 6px;
            border-radius: 3px;
            font-size: 11px;
            color: #333;
            font-weight: 500;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s;
        }

        .event-item:hover {
            transform: translateX(2px);
        }

        .event-item.trabajo { border-left-color: #A9BDD9; background: rgba(169, 189, 217, 0.1); }
        .event-item.personal { border-left-color: #BFD8C8; background: rgba(191, 216, 200, 0.1); }
        .event-item.tareas { border-left-color: #E6B0C2; background: rgba(230, 176, 194, 0.1); }
        .event-item.otros { border-left-color: #BDAED6; background: rgba(189, 174, 214, 0.1); }

        .week-section {
            background: white;
            border-radius: 12px;
            border: 1px solid #eee;
            padding: 24px;
        }

        .week-section h3 {
            color: #A9BDD9;
            font-size: 16px;
            margin-bottom: 16px;
            font-weight: 600;
        }

        .week-events {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .event-card {
            padding: 16px;
            background: #f9f9f9;
            border-left: 4px solid #A9BDD9;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .event-card:hover {
            background: #f5f5f5;
            transform: translateX(4px);
        }

        .event-card.trabajo { border-left-color: #A9BDD9; background: rgba(169, 189, 217, 0.05); }
        .event-card.personal { border-left-color: #BFD8C8; background: rgba(191, 216, 200, 0.05); }
        .event-card.tareas { border-left-color: #E6B0C2; background: rgba(230, 176, 194, 0.05); }
        .event-card.otros { border-left-color: #BDAED6; background: rgba(189, 174, 214, 0.05); }

        .event-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 6px;
            font-size: 15px;
        }

        .event-time {
            font-size: 13px;
            color: #666;
            margin-bottom: 4px;
        }

        .event-meta {
            font-size: 12px;
            color: #A9BDD9;
            font-weight: 500;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .empty-state p {
            font-size: 15px;
            color: #999;
        }

        @media (max-width: 768px) {
            .container { border-radius: 0; }
            .header { padding: 20px; }
            .header h1 { font-size: 20px; }
            .content { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📅 Mi Calendario</h1>
            <div class="auth-section">
                <div id="userInfo" class="user-info" style="display: none;"></div>
                <button id="logoutBtn" class="logout-btn" style="display: none;">Cerrar sesión</button>
                <button id="loginBtn" class="login-btn" style="display: none;">Conectar Google</button>
            </div>
        </div>

        <div class="content">
            <div id="loginContainer" class="login-container">
                <h2>Conecta tu Google Calendar</h2>
                <p>Autoriza esta app para ver tu agenda de manera hermosa y organizada. Solo necesitas hacerlo una vez.</p>
                <button id="googleLoginBtn" class="login-btn">🔐 Conectar con Google</button>
            </div>

            <div id="calendarContainer" style="display: none;">
                <div class="filters">
                    <span class="filter-label">Mostrar calendarios:</span>
                    <label class="calendar-checkbox">
                        <input type="checkbox" id="filterTrabajo" checked>
                        <span class="color-dot" style="background: #A9BDD9;"></span>
                        Trabajo
                    </label>
                    <label class="calendar-checkbox">
                        <input type="checkbox" id="filterPersonal" checked>
                        <span class="color-dot" style="background: #BFD8C8;"></span>
                        Personal
                    </label>
                    <label class="calendar-checkbox">
                        <input type="checkbox" id="filterTareas" checked>
                        <span class="color-dot" style="background: #E6B0C2;"></span>
                        Tareas
                    </label>
                </div>

                <div class="controls">
                    <div class="month-nav">
                        <button id="prevBtn" class="nav-btn">← Anterior</button>
                        <div id="monthTitle" class="month-title"></div>
                        <button id="nextBtn" class="nav-btn" style="background: #BFD8C8;">Siguiente →</button>
                    </div>
                    <button id="exportBtn" class="export-btn">📥 Exportar CSV</button>
                </div>

                <div class="calendar-grid">
                    <div class="weekdays" id="weekdays"></div>
                    <div class="days" id="days"></div>
                </div>

                <div class="week-section">
                    <h3>📌 Esta semana</h3>
                    <div id="weekEvents" class="week-events">
                        <div class="empty-state"><p>No hay eventos esta semana</p></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js" async defer></script>
    
    <script>
        const CLIENT_ID = '942520492430-uniim142p2pj7r2hqkpsi3ld4cg3d6v2.apps.googleusercontent.com';
        const SCOPES = ['https://www.googleapis.com/auth/calendar.readonly'];
        let tokenClient, gapiInited = false, gisInited = false, currentUser = null, allEvents = [], currentDate = new Date();
        const monthNames = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];
        const dayNames = ['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sab'];

        const loginContainer = document.getElementById('loginContainer');
        const calendarContainer = document.getElementById('calendarContainer');
        const logoutBtn = document.getElementById('logoutBtn');
        const googleLoginBtn = document.getElementById('googleLoginBtn');
        const userInfo = document.getElementById('userInfo');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const monthTitle = document.getElementById('monthTitle');
        const exportBtn = document.getElementById('exportBtn');
        const weekdays = document.getElementById('weekdays');
        const days = document.getElementById('days');
        const weekEvents = document.getElementById('weekEvents');

        function waitForGoogleAPIs() {
            return new Promise((resolve) => {
                let attempts = 0;
                const checkInterval = setInterval(() => {
                    if (typeof gapi !== 'undefined' && typeof google !== 'undefined') {
                        clearInterval(checkInterval);
                        resolve();
                    } else if (++attempts > 100) {
                        clearInterval(checkInterval);
                        alert('Error al cargar Google APIs. Recarga la página.');
                    }
                }, 100);
            });
        }

        async function initialize() {
            await waitForGoogleAPIs();
            try {
                await gapi.client.init({
                    apiKey: '',
                    discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest'],
                });
                gapiInited = true;
                tokenClient = google.accounts.oauth2.initTokenClient({
                    client_id: CLIENT_ID,
                    scope: SCOPES.join(' '),
                    callback: handleCredentialResponse,
                });
                gisInited = true;
                checkAuth();
            } catch (error) {
                console.error('Error:', error);
                showLoginUI();
            }
        }

        function handleCredentialResponse(token) {
            gapi.client.setToken(token);
            currentUser = true;
            showCalendarUI();
            loadCalendars();
        }

        function showLoginUI() {
            loginContainer.style.display = 'block';
            calendarContainer.style.display = 'none';
            logoutBtn.style.display = 'none';
            userInfo.style.display = 'none';
        }

        function showCalendarUI() {
            loginContainer.style.display = 'none';
            calendarContainer.style.display = 'block';
            logoutBtn.style.display = 'inline-block';
            userInfo.style.display = 'inline-block';
            userInfo.textContent = '✓ Conectado';
            renderCalendar();
        }

        function checkAuth() {
            try {
                if (gapi.client.getToken()) handleCredentialResponse(gapi.client.getToken());
                else showLoginUI();
            } catch (e) {
                showLoginUI();
            }
        }

        async function loadCalendars() {
            try {
                const response = await gapi.client.calendar.calendarList.list();
                allEvents = [];
                for (const calendar of response.result.items || []) {
                    try {
                        const events = await gapi.client.calendar.events.list({
                            calendarId: calendar.id,
                            timeMin: new Date(currentDate.getFullYear(), currentDate.getMonth() - 1, 1).toISOString(),
                            timeMax: new Date(currentDate.getFullYear(), currentDate.getMonth() + 2, 0).toISOString(),
                            singleEvents: true,
                            orderBy: 'startTime',
                        });
                        if (events.result.items) {
                            events.result.items.forEach(event => {
                                allEvents.push({...event, calendarName: calendar.summary, calendarId: calendar.id});
                            });
                        }
                    } catch (e) { console.error('Error en calendario:', e); }
                }
                renderCalendar();
            } catch (e) { console.error('Error:', e); }
        }

        function renderCalendar() {
            weekdays.innerHTML = '';
            days.innerHTML = '';
            dayNames.forEach(day => {
                const div = document.createElement('div');
                div.className = 'weekday';
                div.textContent = day;
                weekdays.appendChild(div);
            });

            monthTitle.textContent = `${monthNames[currentDate.getMonth()]} ${currentDate.getFullYear()}`;
            const firstDay = new Date(currentDate.getFullYear(), currentDate.getMonth(), 1).getDay();
            const daysInMonth = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 0).getDate();
            const prevMonthDays = new Date(currentDate.getFullYear(), currentDate.getMonth(), 0).getDate();

            for (let i = firstDay - 1; i >= 0; i--) {
                const div = document.createElement('div');
                div.className = 'day other-month';
                div.innerHTML = `<div class="day-number">${prevMonthDays - i}</div>`;
                days.appendChild(div);
            }

            const today = new Date();
            for (let day = 1; day <= daysInMonth; day++) {
                const date = new Date(currentDate.getFullYear(), currentDate.getMonth(), day);
                const div = document.createElement('div');
                div.className = 'day';
                if (date.toDateString() === today.toDateString()) div.classList.add('today');

                const dayEvents = getEventsForDate(date);
                const eventsHTML = dayEvents.map(event => {
                    const calType = event.calendarName.toLowerCase().includes('trabajo') ? 'trabajo' : event.calendarName.toLowerCase().includes('personal') ? 'personal' : 'tareas';
                    return `<div class="event-item ${calType}" title="${event.summary}">${event.summary}</div>`;
                }).join('');

                div.innerHTML = `<div class="day-number">${day}</div><div class="events-list">${eventsHTML}</div>`;
                days.appendChild(div);
            }

            const totalCells = firstDay + daysInMonth;
            const remainingCells = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
            for (let day = 1; day <= remainingCells; day++) {
                const div = document.createElement('div');
                div.className = 'day other-month';
                div.innerHTML = `<div class="day-number">${day}</div>`;
                days.appendChild(div);
            }
            renderWeekEvents();
        }

        function getEventsForDate(date) {
            const filters = {
                Trabajo: document.getElementById('filterTrabajo').checked,
                Personal: document.getElementById('filterPersonal').checked,
                Tareas: document.getElementById('filterTareas').checked,
            };
            return allEvents.filter(event => {
                const eventDate = new Date(event.start.dateTime || event.start.date);
                if (eventDate.toDateString() === date.toDateString()) {
                    const calType = event.calendarName.toLowerCase().includes('trabajo') ? 'Trabajo' : event.calendarName.toLowerCase().includes('personal') ? 'Personal' : 'Tareas';
                    return filters[calType] !== false;
                }
                return false;
            });
        }

        function renderWeekEvents() {
            const today = new Date();
            const weekStart = new Date(today);
            weekStart.setDate(today.getDate() - today.getDay());
            const weekEnd = new Date(weekStart);
            weekEnd.setDate(weekStart.getDate() + 7);

            const weekEventsList = allEvents.filter(event => {
                const eventDate = new Date(event.start.dateTime || event.start.date);
                const calType = event.calendarName.toLowerCase().includes('trabajo') ? 'Trabajo' : event.calendarName.toLowerCase().includes('personal') ? 'Personal' : 'Tareas';
                const filters = { Trabajo: document.getElementById('filterTrabajo').checked, Personal: document.getElementById('filterPersonal').checked, Tareas: document.getElementById('filterTareas').checked };
                return eventDate >= weekStart && eventDate < weekEnd && filters[calType] !== false;
            }).sort((a, b) => new Date(a.start.dateTime || a.start.date) - new Date(b.start.dateTime || b.start.date));

            if (weekEventsList.length === 0) {
                weekEvents.innerHTML = '<div class="empty-state"><p>No hay eventos esta semana</p></div>';
                return;
            }

            weekEvents.innerHTML = weekEventsList.map(event => {
                const eventDate = new Date(event.start.dateTime || event.start.date);
                const calType = event.calendarName.toLowerCase().includes('trabajo') ? 'trabajo' : event.calendarName.toLowerCase().includes('personal') ? 'personal' : 'tareas';
                const timeStr = event.start.dateTime ? eventDate.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' }) : 'Todo el día';
                return `<div class="event-card ${calType}"><div class="event-title">${event.summary}</div><div class="event-time">📅 ${eventDate.toLocaleDateString('es-ES')} • ${timeStr}</div><div class="event-meta">${event.calendarName}</div></div>`;
            }).join('');
        }

        function exportToCSV() {
            const filters = { Trabajo: document.getElementById('filterTrabajo').checked, Personal: document.getElementById('filterPersonal').checked, Tareas: document.getElementById('filterTareas').checked };
            const filtered = allEvents.filter(event => {
                const calType = event.calendarName.toLowerCase().includes('trabajo') ? 'Trabajo' : event.calendarName.toLowerCase().includes('personal') ? 'Personal' : 'Tareas';
                return filters[calType] !== false;
            });

            let csv = 'Evento,Calendario,Fecha,Hora,Descripción\n';
            filtered.forEach(event => {
                const eventDate = new Date(event.start.dateTime || event.start.date);
                const time = event.start.dateTime ? eventDate.toLocaleTimeString('es-ES') : 'Todo el día';
                const title = event.summary.replace(/,/g, ';');
                const description = (event.description || '').replace(/,/g, ';').replace(/\n/g, ' ');
                csv += `"${title}","${event.calendarName}","${eventDate.toLocaleDateString('es-ES')}","${time}","${description}"\n`;
            });

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `calendario_${new Date().toISOString().split('T')[0]}.csv`;
            link.click();
        }

        googleLoginBtn.addEventListener('click', () => {
            if (gisInited && gapiInited) tokenClient.requestAccessToken({ prompt: 'consent' });
        });

        logoutBtn.addEventListener('click', () => {
            const token = gapi.client.getToken();
            if (token !== null) {
                google.accounts.oauth2.revoke(token.access_token);
                gapi.client.setToken(null);
                currentUser = null;
                allEvents = [];
                showLoginUI();
            }
        });

        prevBtn.addEventListener('click', () => {
            currentDate.setMonth(currentDate.getMonth() - 1);
            renderCalendar();
        });

        nextBtn.addEventListener('click', () => {
            currentDate.setMonth(currentDate.getMonth() + 1);
            renderCalendar();
        });

        document.getElementById('filterTrabajo').addEventListener('change', renderCalendar);
        document.getElementById('filterPersonal').addEventListener('change', renderCalendar);
        document.getElementById('filterTareas').addEventListener('change', renderCalendar);

        exportBtn.addEventListener('click', exportToCSV);

        document.addEventListener('DOMContentLoaded', initialize);
    </script>
</body>
</html>
