<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi Calendario</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #f8f9fa, #f0f2f5);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1020px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    /* ── HEADER ── */
    .header {
      background: linear-gradient(135deg, #A9BDD9, #BDAED6);
      padding: 24px 32px;
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 14px;
    }
    .header h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.3px; }
    .badge {
      background: rgba(255,255,255,0.25);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      display: none;
    }
    .btn-logout {
      background: rgba(255,255,255,0.2);
      border: 2px solid white;
      color: white;
      padding: 7px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      display: none;
      transition: background 0.2s;
    }
    .btn-logout:hover { background: rgba(255,255,255,0.35); }

    /* ── TABS ── */
    .tabs {
      display: flex;
      border-bottom: 2px solid #f0f0f0;
      padding: 0 32px;
      gap: 0;
      display: none;
    }
    .tab {
      padding: 14px 22px;
      font-size: 14px;
      font-weight: 500;
      color: #aaa;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      transition: all 0.2s;
      user-select: none;
    }
    .tab:hover { color: #A9BDD9; }
    .tab.active { color: #A9BDD9; border-bottom-color: #A9BDD9; font-weight: 600; }

    /* ── CONTENT ── */
    .content { padding: 24px 32px; }

    /* ── LOGIN ── */
    .login-box { text-align: center; padding: 70px 20px; }
    .login-box h2 { color: #A9BDD9; font-size: 22px; margin-bottom: 10px; }
    .login-box p { color: #999; font-size: 14px; line-height: 1.7; margin-bottom: 32px; max-width: 360px; margin-left: auto; margin-right: auto; }
    .btn-google {
      background: white;
      color: #555;
      border: 2px solid #ddd;
      padding: 12px 28px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .btn-google:hover { box-shadow: 0 4px 14px rgba(0,0,0,0.14); transform: translateY(-1px); }

    /* ── PANEL VIEWS ── */
    .panel { display: none; }
    .panel.active { display: block; }

    /* ── FILTROS ── */
    .filters { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
    .filter-label { color: #aaa; font-size: 13px; }
    .chip {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 6px 13px;
      background: #f5f5f5;
      border: 2px solid #eee;
      border-radius: 20px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      color: #444;
      transition: all 0.2s;
      user-select: none;
    }
    .chip.on { border-color: var(--c); background: color-mix(in srgb, var(--c) 12%, white); }
    .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--c); flex-shrink: 0; }

    /* ── CONTROLES ── */
    .controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
    .month-nav { display: flex; align-items: center; gap: 12px; }
    .btn-nav { background: #BFD8C8; color: white; border: none; padding: 7px 15px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; transition: opacity 0.2s; }
    .btn-nav:hover { opacity: 0.8; }
    .month-title { color: #A9BDD9; font-size: 16px; font-weight: 600; min-width: 155px; text-align: center; }

    .export-group { display: flex; gap: 8px; }
    .btn-export {
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: opacity 0.2s;
    }
    .btn-export:hover { opacity: 0.85; }
    .btn-csv { background: #E6B0C2; }
    .btn-pdf { background: #BDAED6; }

    /* ── GRID CALENDARIO ── */
    .cal-wrap { border: 1px solid #eee; border-radius: 12px; padding: 16px; overflow-x: auto; }
    .wd-row { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 4px; margin-bottom: 4px; }
    .wd { text-align: center; font-size: 11px; font-weight: 700; color: #A9BDD9; padding: 8px 0; text-transform: uppercase; letter-spacing: 0.7px; }
    .days-grid { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 4px; }
    .day-cell {
      background: #fafafa;
      border: 1px solid #eee;
      border-radius: 8px;
      padding: 6px;
      min-height: 80px; min-width: 0;
      transition: border-color 0.2s;
      overflow: hidden;
    }
    .day-cell:hover { border-color: #A9BDD9; }
    .day-cell.faded { opacity: 0.3; }
    .day-cell.today { background: #FFFBEE; border: 2px solid #EDE2B8; }
    .day-num { font-size: 12px; font-weight: 700; color: #A9BDD9; margin-bottom: 5px; }
    .ev-pills { display: flex; flex-direction: column; gap: 3px; }
    .pill {
      font-size: 10px;
      font-weight: 500;
      padding: 2px 5px;
      border-radius: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      border-left: 3px solid var(--c);
      background: color-mix(in srgb, var(--c) 13%, white);
      color: #333;
    }

    /* ── SEMANA ── */
    .ev-card {
      padding: 13px 15px;
      border-left: 4px solid var(--c);
      background: color-mix(in srgb, var(--c) 7%, white);
      border-radius: 8px;
      margin-bottom: 10px;
      transition: transform 0.15s;
    }
    .ev-card:last-child { margin-bottom: 0; }
    .ev-card:hover { transform: translateX(4px); }
    .ev-card-title { font-weight: 600; color: #333; font-size: 14px; margin-bottom: 4px; }
    .ev-card-time  { font-size: 12px; color: #777; margin-bottom: 3px; }
    .ev-card-cal   { font-size: 11px; color: var(--c); font-weight: 600; }

    /* ── TAREAS ── */
    .task-list-title {
      font-size: 14px;
      font-weight: 600;
      color: #A9BDD9;
      margin: 20px 0 10px 0;
      padding-bottom: 6px;
      border-bottom: 1px solid #f0f0f0;
    }
    .task-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 8px;
      margin-bottom: 8px;
      background: #fafafa;
      border: 1px solid #eee;
      transition: all 0.2s;
    }
    .task-item:hover { border-color: #BFD8C8; background: color-mix(in srgb, #BFD8C8 6%, white); }
    .task-item.done { opacity: 0.5; }
    .task-check {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2px solid #BFD8C8;
      flex-shrink: 0;
      margin-top: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: #BFD8C8;
    }
    .task-check.done { background: #BFD8C8; color: white; }
    .task-title { font-size: 14px; color: #333; font-weight: 500; }
    .task-title.done { text-decoration: line-through; color: #aaa; }
    .task-due { font-size: 11px; color: #aaa; margin-top: 3px; }

    .empty { text-align: center; padding: 30px; color: #ccc; font-size: 13px; }
    .loading-msg { text-align: center; padding: 30px; color: #A9BDD9; font-size: 13px; }
  </style>
</head>
<body>

<div class="container">
  <!-- HEADER sin ícono -->
  <div class="header">
    <h1>Mi Calendario</h1>
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
      <span id="badge" class="badge"></span>
      <button id="logoutBtn" class="btn-logout">Cerrar sesión</button>
    </div>
  </div>

  <!-- PESTAÑAS -->
  <div class="tabs" id="tabsRow">
    <div class="tab active" data-tab="week">Mi agenda de la semana</div>
    <div class="tab" data-tab="cal">Calendario</div>
    <div class="tab" data-tab="tasks">Tareas</div>
  </div>

  <div class="content">
    <!-- LOGIN -->
    <div id="loginView" class="login-box">
      <h2>Conecta tu Google Calendar</h2>
      <p>Autoriza el acceso una sola vez para ver toda tu agenda real en este widget.</p>
      <button id="loginBtn" class="btn-google">🔐 Conectar con Google</button>
    </div>

    <!-- PANEL: ESTA SEMANA -->
    <div id="panelWeek" class="panel active" style="display:none;">
      <div id="weekList"><div class="loading-msg">Cargando…</div></div>
    </div>

    <!-- PANEL: CALENDARIO -->
    <div id="panelCal" class="panel" style="display:none;">
      <div class="filters" id="filtersRow">
        <span class="filter-label">Calendarios:</span>
      </div>
      <div class="controls">
        <div class="month-nav">
          <button class="btn-nav" id="prevBtn">← Anterior</button>
          <div class="month-title" id="monthTitle"></div>
          <button class="btn-nav" id="nextBtn">Siguiente →</button>
        </div>
        <div class="export-group">
          <button class="btn-export btn-csv" id="exportCsvBtn">📥 CSV</button>
          <button class="btn-export btn-pdf" id="exportPdfBtn">📄 PDF</button>
        </div>
      </div>
      <div class="cal-wrap">
        <div class="wd-row" id="wdRow"></div>
        <div class="days-grid" id="daysGrid"></div>
      </div>
    </div>

    <!-- PANEL: TAREAS -->
    <div id="panelTasks" class="panel" style="display:none;">
      <div id="tasksList"><div class="loading-msg">Cargando tareas…</div></div>
    </div>
  </div>
</div>

<!-- App script PRIMERO — antes de cargar Google -->
<script>
  const CLIENT_ID  = '942520492430-uniim142p2pj7r2hqkpsi3ld4cg3d6v2.apps.googleusercontent.com';
  const SCOPE      = 'https://www.googleapis.com/auth/calendar.readonly https://www.googleapis.com/auth/tasks.readonly';
  const DISC_CAL   = 'https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest';
  const DISC_TASKS = 'https://www.googleapis.com/discovery/v1/apis/tasks/v1/rest';
  const PALETTE    = ['#A9BDD9','#BDAED6','#E6B0C2','#BFD8C8','#EDE2B8','#B8D8D8'];
  const MONTHS     = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const DAYS       = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];

  var tokenClient;
  var gapiReady     = false;
  var gisReady      = false;
  var allEvents     = [];
  var allTasks      = [];
  var calMeta       = {};
  var activeFilters = {};
  var currentDate   = new Date();
  var activeTab     = 'week';

  // DOM refs
  var loginView    = document.getElementById('loginView');
  var tabsRow      = document.getElementById('tabsRow');
  var badge        = document.getElementById('badge');
  var logoutBtn    = document.getElementById('logoutBtn');
  var loginBtn     = document.getElementById('loginBtn');
  var filtersRow   = document.getElementById('filtersRow');
  var monthTitle   = document.getElementById('monthTitle');
  var wdRow        = document.getElementById('wdRow');
  var daysGrid     = document.getElementById('daysGrid');
  var weekList     = document.getElementById('weekList');
  var tasksList    = document.getElementById('tasksList');
  var exportCsvBtn = document.getElementById('exportCsvBtn');
  var exportPdfBtn = document.getElementById('exportPdfBtn');
  var prevBtn      = document.getElementById('prevBtn');
  var nextBtn      = document.getElementById('nextBtn');
  var panelWeek    = document.getElementById('panelWeek');
  var panelCal     = document.getElementById('panelCal');
  var panelTasks   = document.getElementById('panelTasks');

  /* ── GOOGLE API CALLBACKS ── */
  function onGapiLoad() {
    gapi.load('client', function() {
      gapi.client.init({ discoveryDocs: [DISC_CAL, DISC_TASKS] }).then(function() {
        gapiReady = true;
        tryStart();
      }).catch(function(e){ console.error('gapi init error:', e); });
    });
  }

  function onGisLoad() {
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: CLIENT_ID,
      scope:     SCOPE,
      callback:  onToken,
    });
    gisReady = true;
    tryStart();
  }

  function tryStart() {
    if (!gapiReady || !gisReady) return;
    showLogin();
  }

  function onToken(resp) {
    if (resp.error) { console.error('Token error:', resp.error); return; }
    showApp();
    fetchAll();
  }

  /* ── VISTAS ── */
  function showLogin() {
    loginView.style.display  = 'block';
    tabsRow.style.display    = 'none';
    panelWeek.style.display  = 'none';
    panelCal.style.display   = 'none';
    panelTasks.style.display = 'none';
    badge.style.display      = 'none';
    logoutBtn.style.display  = 'none';
  }

  function showApp() {
    loginView.style.display = 'none';
    tabsRow.style.display   = 'flex';
    badge.style.display     = 'inline-block';
    badge.textContent       = '✓ Conectado';
    logoutBtn.style.display = 'inline-block';
    switchTab('week');
  }

  /* ── TABS ── */
  document.querySelectorAll('.tab').forEach(function(tab) {
    tab.addEventListener('click', function() {
      switchTab(tab.getAttribute('data-tab'));
    });
  });

  function switchTab(name) {
    activeTab = name;
    document.querySelectorAll('.tab').forEach(function(t) {
      t.classList.toggle('active', t.getAttribute('data-tab') === name);
    });
    panelWeek.style.display  = name === 'week'  ? 'block' : 'none';
    panelCal.style.display   = name === 'cal'   ? 'block' : 'none';
    panelTasks.style.display = name === 'tasks' ? 'block' : 'none';
  }

  /* ── AUTH BUTTONS ── */
  loginBtn.addEventListener('click', function() {
    tokenClient.requestAccessToken({ prompt: 'consent' });
  });

  logoutBtn.addEventListener('click', function() {
    var t = gapi.client.getToken();
    if (t) google.accounts.oauth2.revoke(t.access_token, function(){});
    gapi.client.setToken(null);
    allEvents = []; allTasks = []; calMeta = {}; activeFilters = {};
    clearChips();
    showLogin();
  });

  /* ── FETCH DATOS REALES ── */
  async function fetchAll() {
    weekList.innerHTML  = '<div class="loading-msg">Cargando tu agenda…</div>';
    daysGrid.innerHTML  = '<div style="grid-column:1/-1" class="loading-msg">Cargando…</div>';
    tasksList.innerHTML = '<div class="loading-msg">Cargando tareas…</div>';

    await Promise.all([fetchCalendars(), fetchTasks()]);
    render();
  }

  async function fetchCalendars() {
    try {
      var listResp = await gapi.client.calendar.calendarList.list();
      var cals     = listResp.result.items || [];
      allEvents    = [];
      calMeta      = {};
      activeFilters = {};

      cals.forEach(function(cal, i) {
        var color = cal.backgroundColor || PALETTE[i % PALETTE.length];
        calMeta[cal.id]       = { name: cal.summary, color: color };
        activeFilters[cal.id] = true;
      });

      buildChips();

      var timeMin = new Date(currentDate.getFullYear(), currentDate.getMonth() - 1, 1).toISOString();
      var timeMax = new Date(currentDate.getFullYear(), currentDate.getMonth() + 2, 0, 23, 59).toISOString();

      await Promise.all(cals.map(async function(cal) {
        try {
          var r = await gapi.client.calendar.events.list({
            calendarId:   cal.id,
            timeMin:      timeMin,
            timeMax:      timeMax,
            singleEvents: true,
            orderBy:      'startTime',
            maxResults:   500,
          });
          (r.result.items || []).forEach(function(ev) {
            allEvents.push(Object.assign({}, ev, { _calId: cal.id }));
          });
        } catch(e) { console.warn('Error en calendario:', cal.summary, e); }
      }));

    } catch(e) { console.error('Error fetchCalendars:', e); }
  }

  async function fetchTasks() {
    try {
      var listsResp = await gapi.client.tasks.tasklists.list({ maxResults: 20 });
      var lists     = listsResp.result.items || [];
      allTasks      = [];

      await Promise.all(lists.map(async function(list) {
        try {
          var r = await gapi.client.tasks.tasks.list({
            tasklist:    list.id,
            showHidden:  false,
            maxResults:  100,
          });
          (r.result.items || []).forEach(function(task) {
            allTasks.push(Object.assign({}, task, { _listName: list.title }));
          });
        } catch(e) { console.warn('Error en lista de tareas:', list.title, e); }
      }));

    } catch(e) { console.error('Error fetchTasks:', e); }
  }

  /* ── RENDER ── */
  function render() {
    renderGrid();
    renderWeek();
    renderTasks();
  }

  function visible() {
    return allEvents.filter(function(ev){ return activeFilters[ev._calId]; });
  }

  /* ── CHIPS ── */
  function clearChips() {
    filtersRow.querySelectorAll('.chip').forEach(function(c){ c.remove(); });
  }

  function buildChips() {
    clearChips();
    Object.keys(calMeta).forEach(function(id) {
      var meta = calMeta[id];
      var chip = document.createElement('div');
      chip.className = 'chip on';
      chip.style.setProperty('--c', meta.color);
      chip.innerHTML = '<span class="dot"></span>' + meta.name;
      chip.addEventListener('click', function() {
        activeFilters[id] = !activeFilters[id];
        chip.classList.toggle('on', activeFilters[id]);
        render();
      });
      filtersRow.appendChild(chip);
    });
  }

  /* ── GRID MENSUAL ── */
  function renderGrid() {
    wdRow.innerHTML    = '';
    daysGrid.innerHTML = '';

    DAYS.forEach(function(d) {
      var el = document.createElement('div');
      el.className = 'wd'; el.textContent = d;
      wdRow.appendChild(el);
    });

    monthTitle.textContent = MONTHS[currentDate.getMonth()] + ' ' + currentDate.getFullYear();

    var firstWD     = new Date(currentDate.getFullYear(), currentDate.getMonth(), 1).getDay();
    var daysInMonth = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 0).getDate();
    var prevTotal   = new Date(currentDate.getFullYear(), currentDate.getMonth(), 0).getDate();
    var today       = new Date();

    for (var i = 0; i < firstWD; i++)
      daysGrid.appendChild(makeCell(prevTotal - firstWD + 1 + i, true, false, []));

    for (var d = 1; d <= daysInMonth; d++) {
      var date    = new Date(currentDate.getFullYear(), currentDate.getMonth(), d);
      var isToday = date.toDateString() === today.toDateString();
      var evs     = visible().filter(function(ev) {
        if (ev.start.dateTime) {
          var dt = new Date(ev.start.dateTime);
          return dt.toDateString() === date.toDateString();
        } else {
          var parts = ev.start.date.split('-');
          return parseInt(parts[0]) === date.getFullYear() &&
                 parseInt(parts[1]) - 1 === date.getMonth() &&
                 parseInt(parts[2]) === date.getDate();
        }
      });
      daysGrid.appendChild(makeCell(d, false, isToday, evs));
    }

    var total = firstWD + daysInMonth;
    var rem   = total % 7 === 0 ? 0 : 7 - (total % 7);
    for (var d2 = 1; d2 <= rem; d2++)
      daysGrid.appendChild(makeCell(d2, true, false, []));
  }

  function makeCell(num, faded, isToday, evs) {
    var cell = document.createElement('div');
    cell.className = 'day-cell' + (faded ? ' faded' : '') + (isToday ? ' today' : '');

    var numEl = document.createElement('div');
    numEl.className = 'day-num'; numEl.textContent = num;
    cell.appendChild(numEl);

    var pillWrap = document.createElement('div');
    pillWrap.className = 'ev-pills';

    // Mostrar TODOS los eventos, sin límite
    evs.forEach(function(ev) {
      var color = (calMeta[ev._calId] && calMeta[ev._calId].color) || '#A9BDD9';
      var p = document.createElement('div');
      p.className = 'pill';
      p.style.setProperty('--c', color);
      p.textContent = ev.summary || '(Sin título)';
      p.title = ev.summary || '';
      pillWrap.appendChild(p);
    });

    cell.appendChild(pillWrap);
    return cell;
  }

  /* ── ESTA SEMANA ── */
  function renderWeek() {
    var today = new Date();
    var start = new Date(today);
    start.setDate(today.getDate() - today.getDay());
    start.setHours(0,0,0,0);
    var end = new Date(start);
    end.setDate(start.getDate() + 7);

    var evs = visible().filter(function(ev) {
      var dt = new Date(ev.start.dateTime || ev.start.date);
      return dt >= start && dt < end;
    }).sort(function(a, b) {
      return new Date(a.start.dateTime || a.start.date) - new Date(b.start.dateTime || b.start.date);
    });

    if (!evs.length) {
      weekList.innerHTML = '<div class="empty">Sin eventos esta semana 🎉</div>';
      return;
    }

    weekList.innerHTML = '';
    evs.forEach(function(ev) {
      var dt    = new Date(ev.start.dateTime || ev.start.date);
      var color = (calMeta[ev._calId] && calMeta[ev._calId].color) || '#A9BDD9';
      var cal   = (calMeta[ev._calId] && calMeta[ev._calId].name)  || '';
      var time  = ev.start.dateTime
        ? dt.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' })
        : 'Todo el día';

      var card = document.createElement('div');
      card.className = 'ev-card';
      card.style.setProperty('--c', color);
      card.innerHTML =
        '<div class="ev-card-title">' + (ev.summary || '(Sin título)') + '</div>' +
        '<div class="ev-card-time">📅 ' + dt.toLocaleDateString('es-ES', { weekday:'long', day:'numeric', month:'long' }) + ' · ' + time + '</div>' +
        '<div class="ev-card-cal">' + cal + '</div>';
      weekList.appendChild(card);
    });
  }

  /* ── TAREAS ── */
  function renderTasks() {
    if (!allTasks.length) {
      tasksList.innerHTML = '<div class="empty">No se encontraron tareas.</div>';
      return;
    }

    // Agrupar por lista
    var byList = {};
    allTasks.forEach(function(task) {
      var ln = task._listName || 'Sin lista';
      if (!byList[ln]) byList[ln] = [];
      byList[ln].push(task);
    });

    tasksList.innerHTML = '';
    Object.keys(byList).forEach(function(listName) {
      var title = document.createElement('div');
      title.className   = 'task-list-title';
      title.textContent = listName;
      tasksList.appendChild(title);

      byList[listName].forEach(function(task) {
        var isDone = task.status === 'completed';
        var item   = document.createElement('div');
        item.className = 'task-item' + (isDone ? ' done' : '');

        var check = document.createElement('div');
        check.className = 'task-check' + (isDone ? ' done' : '');
        check.textContent = isDone ? '✓' : '';

        var info = document.createElement('div');

        var taskTitle = document.createElement('div');
        taskTitle.className   = 'task-title' + (isDone ? ' done' : '');
        taskTitle.textContent = task.title || '(Sin título)';
        info.appendChild(taskTitle);

        if (task.due) {
          var due = document.createElement('div');
          due.className   = 'task-due';
          due.textContent = '📅 Vence: ' + new Date(task.due).toLocaleDateString('es-ES', { weekday:'long', day:'numeric', month:'long' });
          info.appendChild(due);
        }

        item.appendChild(check);
        item.appendChild(info);
        tasksList.appendChild(item);
      });
    });
  }

  /* ── EXPORT CSV ── */
  exportCsvBtn.addEventListener('click', function() {
    var rows = [['Evento','Calendario','Fecha','Hora','Descripción']];
    visible().forEach(function(ev) {
      var dt   = new Date(ev.start.dateTime || ev.start.date);
      var time = ev.start.dateTime ? dt.toLocaleTimeString('es-ES') : 'Todo el día';
      rows.push([
        '"' + (ev.summary||'').replace(/"/g,'""') + '"',
        '"' + ((calMeta[ev._calId] && calMeta[ev._calId].name)||'').replace(/"/g,'""') + '"',
        '"' + dt.toLocaleDateString('es-ES') + '"',
        '"' + time + '"',
        '"' + (ev.description||'').replace(/"/g,'""').replace(/\n/g,' ') + '"',
      ]);
    });
    var blob = new Blob([rows.map(function(r){ return r.join(','); }).join('\n')], { type:'text/csv;charset=utf-8;' });
    var a    = document.createElement('a');
    a.href   = URL.createObjectURL(blob);
    a.download = 'mi-calendario-' + MONTHS[currentDate.getMonth()] + '-' + currentDate.getFullYear() + '.csv';
    a.click();
  });

  /* ── EXPORT PDF ── */
  exportPdfBtn.addEventListener('click', function() {
    var evs = visible().filter(function(ev) {
      var dt = new Date(ev.start.dateTime || ev.start.date);
      return dt.getMonth() === currentDate.getMonth() && dt.getFullYear() === currentDate.getFullYear();
    }).sort(function(a, b) {
      return new Date(a.start.dateTime || a.start.date) - new Date(b.start.dateTime || b.start.date);
    });

    var rows = evs.map(function(ev) {
      var dt    = new Date(ev.start.dateTime || ev.start.date);
      var time  = ev.start.dateTime ? dt.toLocaleTimeString('es-ES', { hour:'2-digit', minute:'2-digit' }) : 'Todo el día';
      var color = (calMeta[ev._calId] && calMeta[ev._calId].color) || '#A9BDD9';
      var cal   = (calMeta[ev._calId] && calMeta[ev._calId].name)  || '';
      return '<tr>' +
        '<td style="padding:10px 14px;border-bottom:1px solid #f0f0f0;font-weight:500;color:#333;">' + (ev.summary || '(Sin título)') + '</td>' +
        '<td style="padding:10px 14px;border-bottom:1px solid #f0f0f0;color:#666;">' + dt.toLocaleDateString('es-ES', { weekday:'short', day:'numeric', month:'short' }) + '</td>' +
        '<td style="padding:10px 14px;border-bottom:1px solid #f0f0f0;color:#666;">' + time + '</td>' +
        '<td style="padding:10px 14px;border-bottom:1px solid #f0f0f0;"><span style="background:' + color + '22;color:' + color + ';padding:3px 10px;border-radius:12px;font-size:12px;font-weight:600;">' + cal + '</span></td>' +
        '</tr>';
    }).join('');

    var html = '<!DOCTYPE html><html><head><meta charset="UTF-8">' +
      '<title>Mi Calendario - ' + MONTHS[currentDate.getMonth()] + ' ' + currentDate.getFullYear() + '</title>' +
      '<style>body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;padding:40px;color:#333;}' +
      'h1{font-size:24px;font-weight:600;margin-bottom:6px;background:linear-gradient(135deg,#A9BDD9,#BDAED6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}' +
      'p{color:#aaa;font-size:13px;margin-bottom:28px;}' +
      'table{width:100%;border-collapse:collapse;}' +
      'thead tr{background:linear-gradient(135deg,#A9BDD9,#BDAED6);}' +
      'thead th{padding:12px 14px;color:white;font-weight:600;font-size:13px;text-align:left;}' +
      'tbody tr:hover{background:#fafafa;}' +
      '</style></head><body>' +
      '<h1>Mi Calendario</h1>' +
      '<p>' + MONTHS[currentDate.getMonth()] + ' ' + currentDate.getFullYear() + ' · ' + evs.length + ' eventos</p>' +
      '<table><thead><tr>' +
      '<th>Evento</th><th>Fecha</th><th>Hora</th><th>Calendario</th>' +
      '</tr></thead><tbody>' + rows + '</tbody></table>' +
      '<script>window.onload=function(){window.print();}<\/script>' +
      '</body></html>';

    var win = window.open('', '_blank');
    if (win) {
      win.document.write(html);
      win.document.close();
    }
  });

  /* ── NAVEGACIÓN ── */
  prevBtn.addEventListener('click', function() { currentDate.setMonth(currentDate.getMonth()-1); fetchAll(); });
  nextBtn.addEventListener('click', function() { currentDate.setMonth(currentDate.getMonth()+1); fetchAll(); });
</script>
